name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps (render test)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libreoffice-impress poppler-utils
      - name: Install Python deps
        run: pip install python-pptx Pillow pytest playwright
      - name: Install Chromium (html2patch tests)
        run: playwright install --with-deps chromium
      - name: Run tests
        run: pytest tests/ -v
